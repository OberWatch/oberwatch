name: Release
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build dashboard
        run: cd dashboard/svelte && npm ci && npm run build

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MINOR=${VERSION%.*}
          echo "full=$VERSION" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            CHANNEL=latest
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/oberwatch/oberwatch:${{ steps.version.outputs.full }}
            ghcr.io/oberwatch/oberwatch:${{ steps.version.outputs.minor }}
            ghcr.io/oberwatch/oberwatch:latest
            ${{ secrets.DOCKERHUB_NAMESPACE }}/oberwatch:${{ steps.version.outputs.full }}
            ${{ secrets.DOCKERHUB_NAMESPACE }}/oberwatch:${{ steps.version.outputs.minor }}
            ${{ secrets.DOCKERHUB_NAMESPACE }}/oberwatch:latest
