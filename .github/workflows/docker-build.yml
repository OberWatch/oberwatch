name: Docker Build
on:
  push:
    branches: [main, staging]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            CHANNEL=${{ steps.tag.outputs.tag }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/oberwatch/oberwatch:${{ steps.tag.outputs.tag }}
            ghcr.io/oberwatch/oberwatch:sha-${{ github.sha }}
